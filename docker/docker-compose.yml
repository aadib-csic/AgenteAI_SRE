services:
  ollama:
    image: ollama/ollama
    container_name: sre-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sre-agent:
    build: .
    container_name: sre-agent
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    env_file:
      - .env
    volumes:
      - ./audit_trail.jsonl:/app/audit_trail.jsonl
      - ~/.ssh/id_ed25519:/app/keys/id_ed25519:ro

volumes:
  ollama_data:
